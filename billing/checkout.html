<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Cancelled - Emergency Medical Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        :root {
            --primary: #ee5a24;
            --primary-gradient: linear-gradient(135deg, #ee5a24, #f07345);
            --danger-color: #e74c3c;
            --danger-gradient: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #fcfdfe 0%, #f4f6f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }
        .cancel-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(238, 90, 36, 0.1);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08), 0 5px 15px rgba(238, 90, 36, 0.03);
            max-width: 500px;
            width: 100%;
            padding: 2.5rem;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .cancel-icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: var(--danger-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.2);
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .cancel-icon {
            font-size: 2.5rem;
            color: white;
        }
        h1 {
            color: #2c3e50;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.05rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .btn-retry {
            display: inline-block;
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(238, 90, 36, 0.2);
        }
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(238, 90, 36, 0.3);
        }
        .btn-secondary {
            display: inline-block;
            width: 100%;
            padding: 1rem;
            background: #ecf0f1;
            color: #2c3e50;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: #bdc3c7;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="cancel-icon-wrap">
            <span class="cancel-icon">✕</span>
        </div>
        <h1>Checkout Cancelled</h1>
        <p class="subtitle">Your payment checkout was cancelled. No charges were made, and your subscription has not been upgraded.</p>
        
        <div class="button-group">
            <a href="../pricing.html" class="btn-retry">Retry Upgrade</a>
            <a href="../dashboard.html" class="btn-secondary">Go to Dashboard</a>
        </div>
    </div>
</body>
</html>
