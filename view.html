<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="language" content="English">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    
    <!-- Dynamic Meta Tags (Updated by JavaScript) -->
    <title>Emergency Medical Profile - View</title>
    <meta name="description" content="View emergency medical profile with QR code access">
    <meta id="og-title" property="og:title" content="Emergency Medical Profile - View">
    <meta id="og-description" property="og:description" content="Access emergency medical information including blood type, allergies, medications, and emergency contacts">
    <meta id="og-image" property="og:image" content="https://lokeshashapu.github.io/IBM_internship_Project/images/og-profile.png">
    <meta id="og-url" property="og:url" content="">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta id="twitter-title" name="twitter:title" content="Emergency Medical Profile">
    <meta id="twitter-description" name="twitter:description" content="Emergency medical information for paramedics">
    <meta id="twitter-image" name="twitter:image" content="https://lokeshashapu.github.io/IBM_internship_Project/images/twitter-profile.png">
    
    <!-- Canonical URL -->
    <link id="canonical" rel="canonical" href="">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Schema.org JSON-LD (Updated by JavaScript) -->
    <script id="profile-schema" type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "MedicalBusiness",
        "name": "Emergency Medical Profile",
        "url": "https://lokeshashapu.github.io/IBM_internship_Project"
    }
    </script>
    
    <link rel="stylesheet" href="css/main.css">
    <style>
        .view-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .profile-header h1 {
            margin: 0 0 10px 0;
            font-size: 2.2rem;
        }

        .profile-header p {
            margin: 5px 0;
            opacity: 0.95;
        }

        .profile-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .profile-section h3 {
            color: #2196F3;
            border-bottom: 2px solid #E3F2FD;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 10px;
        }

        .info-item {
            padding: 10px;
            background: #F5F5F5;
            border-radius: 8px;
        }

        .info-label {
            font-weight: 600;
            color: #666;
            font-size: 0.9rem;
        }

        .info-value {
            color: #333;
            margin-top: 5px;
            font-size: 1.05rem;
        }

        .list-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #F5F5F5;
            border-left: 4px solid #2196F3;
            border-radius: 4px;
        }

        .allergy-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #FFF3E0;
            border-left: 4px solid #FF9800;
            color: #E65100;
            border-radius: 4px;
            font-weight: 600;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .contact-card {
            background: #E3F2FD;
            border: 2px solid #2196F3;
            border-radius: 8px;
            padding: 15px;
        }

        .contact-card h4 {
            color: #1976D2;
            margin: 0 0 10px 0;
        }

        .contact-card p {
            margin: 5px 0;
            color: #333;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #2196F3;
            color: white;
        }

        .btn-primary:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #757575;
            color: white;
        }

        .btn-secondary:hover {
            background: #616161;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .error-container {
            background: #FFEBEE;
            border-left: 4px solid #F44336;
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
            color: #C62828;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #2196F3;
        }

        .loading::after {
            content: '';
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { content: '⠋'; }
            10% { content: '⠙'; }
            20% { content: '⠹'; }
            30% { content: '⠸'; }
            40% { content: '⠼'; }
            50% { content: '⠴'; }
            60% { content: '⠦'; }
            70% { content: '⠧'; }
            80% { content: '⠇'; }
            90% { content: '⠏'; }
        }

        @media (max-width: 768px) {
            .info-row {
                grid-template-columns: 1fr;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .profile-header h1 {
                font-size: 1.8rem;
            }
        }

        @media print {
            .action-buttons {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="view-container">
        <div id="content">
            <!-- Profile content will be loaded here -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Update SEO meta tags dynamically
        function updateSEOMetaTags(profile, profileCode) {
            const fullName = escapeHtml(profile.personal.fullName);
            const bloodType = escapeHtml(profile.personal.bloodType);
            const pageUrl = `${window.location.origin}${window.location.pathname}?code=${profileCode}`;
            
            // Update title
            document.title = `${fullName} - Emergency Medical Profile | EMP`;
            
            // Update description with profile summary
            const description = `Emergency medical profile for ${fullName}. Blood type: ${bloodType}. Access critical medical information for paramedics and emergency personnel.`;
            document.querySelector('meta[name="description"]').setAttribute('content', description.substring(0, 160));
            
            // Update Open Graph tags
            document.getElementById('og-title').setAttribute('content', `${fullName} - Emergency Medical Profile`);
            document.getElementById('og-description').setAttribute('content', description.substring(0, 160));
            document.getElementById('og-url').setAttribute('content', pageUrl);
            
            // Update Twitter tags
            document.getElementById('twitter-title').setAttribute('content', `${fullName} - Emergency Medical Profile`);
            document.getElementById('twitter-description').setAttribute('content', description.substring(0, 160));
            
            // Update canonical URL
            document.getElementById('canonical').setAttribute('href', pageUrl);
            
            // Update Schema.org JSON-LD with MedicalProfile schema
            const schemaData = {
                "@context": "https://schema.org",
                "@type": "MedicalProfile",
                "name": fullName,
                "identifier": profileCode,
                "url": pageUrl,
                "description": `Emergency medical profile containing allergies, medications, chronic conditions, and emergency contacts`,
                "medicalSpecialty": "Emergency Medicine",
                "bloodType": bloodType,
                "knowsAbout": [
                    ...profile.medical.conditions,
                    ...profile.medical.allergies,
                    ...profile.medical.medications
                ],
                "author": {
                    "@type": "Person",
                    "name": fullName
                }
            };
            document.getElementById('profile-schema').textContent = JSON.stringify(schemaData);
        }

        // Get profile ID from URL parameter
        async function loadProfileFromQR() {
            const urlParams = new URLSearchParams(window.location.search);
            const profileCode = urlParams.get('code');

            if (!profileCode) {
                showError('No profile code provided. Please scan a valid QR code or contact the profile owner.');
                return;
            }

            try {
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = '<div class="loading">Loading profile...</div>';

                // Load profile
                const profile = await findProfileById(profileCode);

                if (!profile) {
                    showError(`Profile with code <strong>${escapeHtml(profileCode)}</strong> not found. This may mean:<br>
                             • The code is incorrect<br>
                             • The profile has been deleted<br>
                             • The profile was created on a different device`);
                    return;
                }

                // Update SEO meta tags with profile data
                updateSEOMetaTags(profile, profileCode);

                // Display profile
                displayProfile(profile);
            } catch (error) {
                console.error('Error loading profile:', error);
                showError('An error occurred while loading the profile. Please try again.');
            }
        }

        function displayProfile(profile) {
            const contentDiv = document.getElementById('content');
            const age = calculateAge(profile.personal.dob);

            contentDiv.innerHTML = `
                <div class="profile-header">
                    <h1>🚑 Emergency Medical Profile</h1>
                    <p><strong>${escapeHtml(profile.personal.fullName)}</strong></p>
                    <p>Profile ID: ${escapeHtml(profile._id)}</p>
                </div>

                <div class="profile-section">
                    <h3>👤 Personal Information</h3>
                    <div class="info-row">
                        <div class="info-item">
                            <div class="info-label">Date of Birth</div>
                            <div class="info-value">${new Date(profile.personal.dob).toLocaleDateString()}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Age</div>
                            <div class="info-value">${age} years</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Blood Type</div>
                            <div class="info-value" style="font-size: 1.3rem; font-weight: 700; color: #D32F2F;">
                                ${escapeHtml(profile.personal.bloodType)}
                            </div>
                        </div>
                    </div>
                </div>

                ${profile.medical.conditions.length > 0 ? `
                <div class="profile-section">
                    <h3>🏥 Chronic Conditions</h3>
                    ${profile.medical.conditions.map(c => `<div class="list-item">• ${escapeHtml(c)}</div>`).join('')}
                </div>
                ` : ''}

                ${profile.medical.allergies.length > 0 ? `
                <div class="profile-section">
                    <h3>⚠️ Allergies</h3>
                    ${profile.medical.allergies.map(a => `<div class="allergy-item">🚫 ${escapeHtml(a)}</div>`).join('')}
                </div>
                ` : ''}

                ${profile.medical.medications.length > 0 ? `
                <div class="profile-section">
                    <h3>💊 Current Medications</h3>
                    ${profile.medical.medications.map(m => `<div class="list-item">• ${escapeHtml(m)}</div>`).join('')}
                </div>
                ` : ''}

                ${profile.emergencyContacts.length > 0 ? `
                <div class="profile-section">
                    <h3>🚨 Emergency Contacts</h3>
                    <div class="contact-grid">
                        ${profile.emergencyContacts.map(contact => `
                            <div class="contact-card">
                                <h4>${escapeHtml(contact.name)}</h4>
                                <p><strong>Phone:</strong> ${escapeHtml(contact.phone)}</p>
                                <p><strong>Relationship:</strong> ${escapeHtml(contact.relationship)}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                <div class="profile-section">
                    <p style="text-align: center; color: #999; font-size: 0.9rem;">
                        Last Updated: ${new Date(profile.updatedAt).toLocaleString()}<br>
                        <strong style="color: #D32F2F;">⚠️ For medical emergencies, call your local emergency number immediately</strong>
                    </p>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ Print Profile</button>
                    <button class="btn btn-success" onclick="downloadProfilePDFFromView()">📄 Download PDF</button>
                    <button class="btn btn-secondary" onclick="goBack()">← Back</button>
                </div>
            `;
        }

        function showError(message) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="error-container">
                    <h2>⚠️ Error Loading Profile</h2>
                    <p>${message}</p>
                    <button class="btn btn-secondary" onclick="goBack()" style="margin-top: 15px;">← Go Back</button>
                </div>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function goBack() {
            if (document.referrer) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        async function downloadProfilePDFFromView() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const profileCode = urlParams.get('code');
                if (!profileCode) {
                    alert('Profile code not found');
                    return;
                }

                const profile = await findProfileById(profileCode);
                if (!profile) {
                    alert('Profile not found');
                    return;
                }

                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                let yPosition = 20;

                // Header
                doc.setTextColor(33, 66, 99);
                doc.setFontSize(16);
                doc.text('🚑 Emergency Medical Profile Report', pageWidth / 2, yPosition, { align: 'center' });
                yPosition += 15;

                // Profile Code & Date
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(10);
                doc.text(`Access Code: ${profile._id}`, pageWidth / 2, yPosition, { align: 'center' });
                doc.text(`Generated: ${new Date().toLocaleDateString()}`, pageWidth / 2, yPosition + 6, { align: 'center' });
                yPosition += 18;

                // Personal Information
                doc.setFontSize(12);
                doc.setTextColor(33, 66, 99);
                doc.text('Personal Information', 15, yPosition);
                yPosition += 8;

                doc.setTextColor(0, 0, 0);
                doc.setFontSize(10);
                doc.text(`Name: ${profile.personal.fullName}`, 15, yPosition);
                yPosition += 6;
                doc.text(`DOB: ${profile.personal.dob}`, 15, yPosition);
                yPosition += 6;
                doc.text(`Blood Type: ${profile.personal.bloodType}`, 15, yPosition);
                yPosition += 12;

                // Medical Information
                doc.setFontSize(12);
                doc.setTextColor(33, 66, 99);
                doc.text('Medical Information', 15, yPosition);
                yPosition += 8;

                doc.setTextColor(0, 0, 0);
                doc.setFontSize(10);

                if (profile.medical.conditions?.length > 0) {
                    doc.text('Chronic Conditions:', 15, yPosition);
                    yPosition += 5;
                    profile.medical.conditions.forEach(condition => {
                        doc.text(`• ${condition}`, 20, yPosition);
                        yPosition += 5;
                    });
                    yPosition += 2;
                }

                if (profile.medical.allergies?.length > 0) {
                    doc.text('Allergies:', 15, yPosition);
                    yPosition += 5;
                    profile.medical.allergies.forEach(allergy => {
                        doc.text(`• ${allergy}`, 20, yPosition);
                        yPosition += 5;
                    });
                    yPosition += 2;
                }

                if (profile.medical.medications?.length > 0) {
                    doc.text('Current Medications:', 15, yPosition);
                    yPosition += 5;
                    profile.medical.medications.forEach(med => {
                        const lines = doc.splitTextToSize(`• ${med}`, pageWidth - 30);
                        lines.forEach(line => {
                            if (yPosition > pageHeight - 15) {
                                doc.addPage();
                                yPosition = 20;
                            }
                            doc.text(line, 20, yPosition);
                            yPosition += 5;
                        });
                    });
                }

                // Download
                const fileName = `Emergency-Profile-${profile.personal.fullName.replace(/\s+/g, '-')}-${new Date().getTime()}.pdf`;
                doc.save(fileName);
            } catch (error) {
                console.error('Error generating PDF:', error);
                alert('Error generating PDF. Please try again.');
            }
        }

        // Load profile when page loads
        document.addEventListener('DOMContentLoaded', loadProfileFromQR);
    </script>
</body>
</html>
